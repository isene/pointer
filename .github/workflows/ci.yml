name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  check:
    name: Check & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: pointer

      - name: Checkout crust
        uses: actions/checkout@v4
        with:
          repository: isene/crust
          path: crust

      - name: Checkout glow
        uses: actions/checkout@v4
        with:
          repository: isene/glow
          path: glow

      - uses: dtolnay/rust-toolchain@stable

      - name: Build
        working-directory: pointer
        run: cargo build --release

      - name: Binary size
        working-directory: pointer
        run: ls -lh target/release/pointer
